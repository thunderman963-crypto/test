[build]
builder = "NIXPACKS"

[deploy]
# Railway runs this before starting the server on every deploy
startCommand = "python manage.py migrate --no-input && python manage.py collectstatic --no-input && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
